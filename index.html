<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🛠️ Keybox Forge | Pro Edition</title>
<style>
/* TEMA: NEON CYAN & DEEP SPACE */
:root{--accent:#00f2ff;--bg1:#0a0f14;--bg2:#020406;--text:#f0f0f0;--muted:#6272a4;--card:rgba(255,255,255,0.02);--danger:#ff6b6b}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text);padding:40px 20px}

header{text-align:center;margin-bottom:40px}
header h1{margin:0;font-size:38px;letter-spacing:-2px;text-transform:uppercase;font-style:italic;font-weight:900}
header p{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:5px}

.section{width:100%;max-width:480px;background:var(--card);padding:24px;border-radius:20px;border:1px solid rgba(0,242,255,0.1);margin-bottom:20px;backdrop-filter:blur(10px)}
.section-title{margin:0 0 15px 0;font-size:13px;font-weight:800;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:8px}

.btn-group{display:flex;flex-wrap:wrap;gap:12px}
button{padding:14px;font-weight:700;color:var(--text);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;transition:0.3s;flex:1;min-width:100px;font-size:12px}
button:hover{border-color:var(--accent);box-shadow:0 0 15px rgba(0,242,255,0.2);background:rgba(0,242,255,0.05)}

textarea{width:100%;height:100px;background:rgba(0,0,0,0.3);color:var(--accent);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px;font-family:monospace;font-size:10px;margin-top:8px;resize:none;line-height:1.4}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:rgba(98,114,164,0.5)}

.output{min-height:140px;display:flex;flex-direction:column;align-items:center;gap:15px;margin-top:10px;width:100%}
#dl{color:#000;font-weight:800;text-decoration:none;background:var(--accent);padding:14px 28px;border-radius:12px;box-shadow:0 4px 15px rgba(0,242,255,0.3);transition:0.2s;width:100%;max-width:300px;text-align:center}
#dl:active{transform:scale(0.95)}
#msg{font-size:13px;color:var(--muted);text-align:center;line-height:1.6}

label{font-size:11px;color:var(--muted);margin-top:12px;display:block;font-weight:bold}
strong{color:var(--accent)}
.err{color:var(--danger)}
.hidden{display:none}

/* FOOTER/INTEGRITY CHECKER */
.checker-btn{width:100%;margin-top:15px;background:transparent;border:1px solid var(--danger);color:var(--danger);font-weight:800}
.checker-btn:hover{background:rgba(255,107,107,0.1);border-color:var(--danger)}
</style>
</head>
<body>

<header>
  <h1>Keybox<span style="color:var(--accent)">Forge</span></h1>
  <p>Elite Integrity Crafter</p>
</header>

<div class="section">
  <div class="section-title">📡 Auto-Retrieval</div>
  <div class="btn-group">
    <button onclick="doFetch('tricky')">Tricky</button>
    <button onclick="doFetch('yurikey')">Yurikey</button>
    <button onclick="doFetch('integrity')">Integrity</button>
  </div>
</div>

<div class="section">
  <div class="section-title">⚒️ Custom Smithing</div>
  <label>Private Key (PEM Format):</label>
  <textarea id="inKey" placeholder="-----BEGIN PRIVATE KEY-----&#10;MIIEvAIBADANBgkqhkiG9w0BAQEFAASC...&#10;-----END PRIVATE KEY-----"></textarea>
  
  <label>Certificate Chain (Tumpuk 3 Lapis):</label>
  <textarea id="inCert" placeholder="-----BEGIN CERTIFICATE-----&#10;MIIDDTCCAfWgAwIBAg... (Chain 1: Perangkat)&#10;-----END CERTIFICATE-----&#10;-----BEGIN CERTIFICATE-----&#10;MIIDDTCCAfWgAwIBAg... (Chain 2: Intermediate)&#10;-----END CERTIFICATE-----&#10;-----BEGIN CERTIFICATE-----&#10;MIIDDTCCAfWgAwIBAg... (Chain 3: Root CA)&#10;-----END CERTIFICATE-----"></textarea>
  
  <button onclick="buildCustom()" style="width:100%;margin-top:20px;background:var(--accent);color:#000;border:none">FORGE KEYBOX XML</button>
</div>

<div class="section" style="border-color:rgba(255,107,107,0.2)">
  <div class="section-title" style="color:var(--danger)">🛡️ Integrity Checker</div>
  <p style="font-size:10px;color:var(--muted);margin:0">Cek status Integrity lewat jalur resmi Google Play Store:</p>
  <button class="checker-btn" onclick="window.location.href='intent://com.android.vending/integrity_check#Intent;scheme=market;end'">OPEN PLAY STORE CHECKER</button>
</div>

<div class="output">
  <div id="ld" class="hidden" style="color:var(--accent);font-weight:bold;letter-spacing:2px">⚡ FORGING...</div>
  <a id="dl" class="hidden"></a>
  <div id="msg"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const hex=(h)=>h.match(/../g).map(b=>String.fromCharCode(parseInt(b,16))).join('');
const rot=(s)=>s.replace(/[a-z]/gi,c=>String.fromCharCode((c<='Z'?65:97)+(c.charCodeAt(0)-(c<='Z'?65:97)+13)%26));

const sources = {
  tricky: { r:'KOWX712/Tricky-Addon-Update-Target-List', p:'.extra', u: 'https://raw.githubusercontent.com/KOWX712/Tricky-Addon-Update-Target-List/keybox/.extra', n: 'tricky_addon.xml' },
  yurikey: { r:'Yurii0307/yurikey', p:'key', u: 'https://raw.githubusercontent.com/Yurii0307/yurikey/main/key', n: 'yurikey.xml' },
  integrity: { r:'MeowDump/MeowDump', p:'NullVoid/ShockWave.tar', u: 'https://raw.githubusercontent.com/MeowDump/MeowDump/main/NullVoid/ShockWave.tar', n: 'integritybox.xml' }
};

const formatTime=ms=>{
  const min=Math.floor(ms/60000), hr=Math.floor(min/60), day=Math.floor(hr/24);
  if(min<1) return 'Just now'; if(min<60) return min+'m ago'; if(hr<24) return hr+'h ago';
  return day+(day===1?' day ago':' days ago');
};

async function getUpdateInfo(repo, path) {
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/commits?path=${path}&per_page=1`);
    if(!res.ok) return 'Check Manual';
    const data = await res.json();
    return formatTime(Date.now() - new Date(data[0].commit.committer.date));
  } catch { return 'Unavailable'; }
}

async function doFetch(type) {
  const ld=$('ld'), dl=$('dl'), msg=$('msg');
  ld.classList.remove('hidden'); dl.classList.add('hidden'); msg.innerHTML='';
  try {
    const res = await fetch(sources[type].u);
    let raw = await res.text(), final = '';
    const lastUpdate = await getUpdateInfo(sources[type].r, sources[type].p);
    
    if(type==='tricky') final = atob(hex(raw.replace(/\s+/g,'')));
    else if(type==='yurikey') final = atob(raw.trim());
    else {
      let d = raw.trim(); for(let i=0; i<10; i++) d = atob(d.replace(/\s/g,''));
      final = rot(hex(d)); ["every","soul","will","taste","death"].forEach(w=> final = final.split(w).join(""));
    }
    
    // --- PROSES SANITIZER (BERSIH-BERSIH XML) ---
    // 1. Sapu bersih semua komentar ()
    final = final.replace(//g, "");
    
    // 2. Benerin atribut algorithm yang dikasih watermark nama orang
    // Ngebaca kalau ada kata "Yuri" di dalam tag algorithm, paksa ganti jadi "rsa"
    final = final.replace(/algorithm="[^"]*Yuri[^"]*"/gi, 'algorithm="rsa"');
    
    // 3. Rapihin baris kosong/enter yang berlebihan biar injector ROM nggak bingung
    final = final.replace(/^\s*[\r\n]/gm, "");
    // ---------------------------------------------
    
    setDownload(final, sources[type].n);
    msg.innerHTML = `STATUS: <strong>READY & CLEANED 🧹</strong><br>SOURCE UPDATE: <strong>${lastUpdate}</strong>`;
  } catch(e) { msg.innerHTML = "<span class='err'>X FETCH FAILED X</span>"; }
  finally { ld.classList.add('hidden'); }
}

</script>
</body>
</html>
